<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>grana.app — login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
<div class="login-wrap">
  <div class="login-logo">grana<span>.app</span></div>
  <p class="login-sub">controle financeiro pessoal</p>
  <div class="login-card">
    <label class="field-label">senha</label>
    <input type="password" id="senhaInput" class="field-input" placeholder="••••••••••••" autofocus
      onkeydown="if(event.key==='Enter')entrar()">
    <div class="login-error" id="loginErro"></div>
    <button class="btn-primary" onclick="entrar()">entrar</button>
  </div>
</div>
<script src="js/auth.js"></script>
<script>
  if (authVerificarSessao()) window.location.href = 'app.html';
</script>
</body>
</html>
