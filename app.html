<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>grana.app</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">grana<span>.app</span></div>
    <div class="topbar-right">
      <div class="month-nav">
        <button class="month-arrow" onclick="Dashboard.mesAnterior()">&#8249;</button>
        <span class="month-label" id="mesLabel">—</span>
        <button class="month-arrow" onclick="Dashboard.mesProximo()">&#8250;</button>
      </div>
      <button class="btn-icon" onclick="authSair()" title="sair">&#8594;</button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn active" onclick="goPage('resumo',this)">resumo</button>
    <button class="nav-btn" onclick="goPage('contas',this)">contas</button>
    <button class="nav-btn" onclick="goPage('devedores',this)">devedores</button>
    <button class="nav-btn" onclick="goPage('graficos',this)">gráficos</button>
    <button class="nav-btn" onclick="goPage('alertas',this)">alertas</button>
  </div>

  <!-- RESUMO -->
  <div id="page-resumo" class="page show">
    <div class="metrics" id="metricsGrid"></div>
    <div class="section-label">fluxo do mês</div>
    <div class="chart-wrap" style="height:220px">
      <canvas id="chartFluxo" role="img" aria-label="Fluxo do mês atual">Fluxo mensal.</canvas>
    </div>
    <div class="section-label">gastos por categoria</div>
    <div class="chart-wrap" style="height:260px">
      <canvas id="chartCats" role="img" aria-label="Gastos por categoria no mês">Gastos por categoria.</canvas>
    </div>
  </div>

  <!-- CONTAS -->
  <div id="page-contas" class="page">
    <div class="section-header">
      <div>
        <div class="section-label" style="margin:0 0 2px">contas do mês</div>
        <div class="section-sub" id="contasMesLabel"></div>
      </div>
      <button class="btn-add" onclick="Contas.abrirModal()">+ adicionar</button>
    </div>
    <div class="salario-row">
      <span class="salario-label">salário do mês</span>
      <div class="salario-edit">
        <span>R$</span>
        <input type="number" id="salarioInput" class="salario-input" placeholder="0" min="0"
          onchange="Contas.salvarSalario(this.value)">
      </div>
    </div>
    <div id="contasList"></div>
  </div>

  <!-- DEVEDORES -->
  <div id="page-devedores" class="page">
    <div class="section-header">
      <div class="section-label" style="margin:0">devedores</div>
      <button class="btn-add" onclick="Devedores.abrirModal()">+ adicionar</button>
    </div>
    <p class="hint-text">Pessoas que te devem — independente do mês.</p>
    <div id="devedoresList"></div>
  </div>

  <!-- GRÁFICOS -->
  <div id="page-graficos" class="page">
    <div class="section-label">histórico — salário vs gastos</div>
    <div class="chart-wrap" style="height:260px">
      <canvas id="chartHistorico" role="img" aria-label="Histórico salário vs gastos">Histórico.</canvas>
    </div>
    <div class="section-label">evolução por categoria</div>
    <div class="legend" id="legendCats"></div>
    <div class="chart-wrap" style="height:280px">
      <canvas id="chartEvolucao" role="img" aria-label="Evolução por categoria">Evolução categorias.</canvas>
    </div>
  </div>

  <!-- ALERTAS -->
  <div id="page-alertas" class="page">
    <div class="alertas-filter">
      <button class="filter-btn active" data-filter="mes" onclick="Alertas.filtrar('mes',this)">mês atual</button>
      <button class="filter-btn" data-filter="todos" onclick="Alertas.filtrar('todos',this)">todos os meses</button>
    </div>
    <div id="alertasList"></div>
  </div>
</div>

<!-- MODAL CONTA -->
<div id="modalConta" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modalContaTitulo">nova conta</div>
    <label class="field-label">nome da conta</label>
    <input type="text" id="contaNome" class="field-input" placeholder="ex: Nubank, Aluguel...">
    <label class="field-label">valor (R$)</label>
    <input type="number" id="contaValor" class="field-input" placeholder="0,00" min="0">
    <label class="field-label">categoria</label>
    <select id="contaCategoria" class="field-input">
      <option value="cartao">cartão de crédito</option>
      <option value="moradia">moradia</option>
      <option value="educacao">educação</option>
      <option value="saude">saúde / academia</option>
      <option value="transporte">transporte</option>
      <option value="alimentacao">alimentação</option>
      <option value="assinatura">assinatura / internet</option>
      <option value="parcelado">parcelado</option>
      <option value="outro">outro</option>
    </select>
    <label class="field-label">status</label>
    <div class="toggle-row">
      <button class="toggle-btn active" id="btnPendente" onclick="Contas.setStatus('pendente')">pendente</button>
      <button class="toggle-btn" id="btnPago" onclick="Contas.setStatus('pago')">pago</button>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="Contas.fecharModal()">cancelar</button>
      <button class="btn-primary" onclick="Contas.salvar()">salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DEVEDOR -->
<div id="modalDevedor" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title">novo devedor</div>
    <label class="field-label">nome</label>
    <input type="text" id="devedorNome" class="field-input" placeholder="Nome da pessoa">
    <label class="field-label">valor devido (R$)</label>
    <input type="number" id="devedorValor" class="field-input" placeholder="0,00" min="0">
    <label class="field-label">descrição (opcional)</label>
    <input type="text" id="devedorDesc" class="field-input" placeholder="ex: dinheiro emprestado">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="Devedores.fecharModal()">cancelar</button>
      <button class="btn-primary" onclick="Devedores.salvar()">salvar</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/contas.js"></script>
<script src="js/dashboard.js"></script>
<script>
  if (!authVerificarSessao()) window.location.href = 'index.html';

  let paginaAtual = 'resumo';
  let pgsCarregadas = { resumo: false };

  function goPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('show');
    btn.classList.add('active');
    paginaAtual = id;
    if (id === 'resumo') Dashboard.renderResumo();
    if (id === 'contas') Contas.renderLista();
    if (id === 'devedores') Devedores.renderLista();
    if (id === 'graficos') Dashboard.renderGraficos();
    if (id === 'alertas') Alertas.render();
  }

  Dashboard.init();
</script>
</body>
</html>
